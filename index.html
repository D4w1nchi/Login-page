<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>D4w1nchi Login</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}body{font-family:Poppins,sans-serif;background:#09070f;height:100vh;display:grid;place-items:center;overflow:hidden}
body:before,body:after{content:"";position:absolute;border-radius:50%;filter:blur(90px)}
body:before{width:420px;height:420px;background:#7c3aed55;left:-120px;top:-120px}
body:after{width:360px;height:360px;background:#c026d355;right:-100px;bottom:-100px}
.grid{position:fixed;inset:0;background:
linear-gradient(#ffffff08 1px,transparent 1px),
linear-gradient(90deg,#ffffff08 1px,transparent 1px);
background-size:40px 40px;mask-image:radial-gradient(circle,#000 45%,transparent 100%);animation:g 15s linear infinite}
@keyframes g{to{transform:translateY(40px)}}
.card{width:min(92vw,430px);padding:38px;border-radius:28px;background:rgba(20,14,33,.6);backdrop-filter:blur(18px);border:1px solid #9f67ff55;box-shadow:0 0 45px #7c3aed55;animation:f 5s ease-in-out infinite;transition:.2s}
@keyframes f{50%{transform:translateY(-10px)}}
h1{color:#fff;text-align:center}p{text-align:center;color:#aaa;margin:8px 0 24px}
.field{position:relative;margin:16px 0}
input{width:100%;padding:15px 46px 15px 15px;background:#ffffff0a;border:1px solid #ffffff18;border-radius:14px;color:#fff;outline:none}
input:focus{border-color:#a855f7;box-shadow:0 0 20px #9333ea66}
.eye{position:absolute;right:15px;top:50%;translate:0 -50%;cursor:pointer;color:#bbb;font-size:18px}
.row{display:flex;justify-content:space-between;font-size:13px;margin-top:10px}
a{color:#c084fc;text-decoration:none}
button{margin-top:18px;width:100%;padding:15px;border:0;border-radius:14px;background:linear-gradient(90deg,#6d28d9,#c026d3);color:#fff;font-weight:700;cursor:pointer}
button:hover{box-shadow:0 0 30px #a855f7}
.sig{position:fixed;bottom:18px;color:#b78cff;letter-spacing:4px}
</style></head><body>
<div class="grid"></div>
<div class="card" id="card">
<h1>WELCOME BACK</h1><p>Sign in to continue</p>
<div class="field"><input placeholder="Username"></div>
<div class="field"><input id="pw" type="password" placeholder="Password"><span class="eye" id="eye">◉</span></div>
<div class="row"><label style="color:#aaa"><input type="checkbox" style="width:auto;margin-right:6px">Remember me</label><a href="#">Forgot Password?</a></div>
<button id="btn">LOGIN</button>
</div>
<div class="sig">D4w1nchi</div>
<script>
eye.onclick=()=>{pw.type=pw.type==='password'?'text':'password';eye.textContent=pw.type==='text'?'◎':'◉'}
document.onmousemove=e=>{let x=(e.clientX/innerWidth-.5)*10,y=(e.clientY/innerHeight-.5)*10;card.style.transform=`rotateY(${x}deg) rotateX(${-y}deg) translateY(-4px)`;}
btn.onclick=e=>{e.preventDefault();btn.textContent='Loading...';setTimeout(()=>btn.textContent='LOGIN',1200);}
</script></body></html>
